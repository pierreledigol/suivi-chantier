<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi de Chantier — Cuves</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --accent: #f0a500;
    --accent2: #e05c00;
    --red: #e03333;
    --green: #22c55e;
    --blue: #3b82f6;
    --text: #e8eaf0;
    --muted: #6b7280;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --display: 'Bebas Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    height: auto;
    overflow: hidden;
    transition: transform 0.3s ease;
    z-index: 100;
  }

  #sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #sidebar-header h2 {
    font-family: var(--display);
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  #sidebar-header p {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  #sidebar-close {
    display: none;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }

  #archives-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  #archives-list::-webkit-scrollbar { width: 4px; }
  #archives-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Bouton flottant pour ouvrir la sidebar sur mobile */
  #sidebar-toggle {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 12px;
    cursor: pointer;
    gap: 6px;
    align-items: center;
  }

  /* Overlay sombre derrière la sidebar ouverte */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 99;
  }
  #sidebar-overlay.visible { display: block; }

  /* ── RESPONSIVE MOBILE ── */
  @media (max-width: 640px) {
    body { overflow-y: auto; } /* scroll global */

    #sidebar {
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      transform: translateX(-100%);
      box-shadow: 4px 0 24px rgba(0,0,0,0.5);
    }
    #sidebar.open {
      transform: translateX(0);
    }
    #sidebar-close { display: block; }

    /* Bouton ARCHIVES sous la topbar, pleine largeur */
    #sidebar-toggle {
      display: flex;
      position: static;
      width: 100%;
      border-radius: 0;
      border-top: none;
      border-left: none;
      border-right: none;
      border-bottom: 1px solid var(--border);
      justify-content: center;
      padding: 10px 16px;
      font-size: 12px;
      background: var(--surface);
    }

    #main {
      width: 100%;
      margin-left: 0 !important;
      height: auto;
      min-height: 100vh;
      overflow: visible;
    }

    #topbar {
      justify-content: center;
      padding: 16px;
    }
    #topbar h1 {
      text-align: center;
    }

    #content {
      justify-content: flex-start;
      padding: 24px 16px 80px;
    }
  }

  .archive-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .archive-item:hover {
    border-color: var(--accent);
    background: #222840;
  }

  .archive-item .arc-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .archive-item .arc-cuves {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
    font-weight: 600;
  }

  .archive-item .arc-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    height: auto;
    overflow: visible;
  }

  #topbar {
    display: flex;
    align-items: center;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }

  #topbar h1 {
    font-family: var(--display);
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--text);
  }

  #topbar .phase-badge {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px;
    overflow: visible;
    min-height: 60vh;
  }

  /* ── CHRONO ── */
  #chrono-bar {
    display: none;
    align-items: center;
    gap: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 13px;
    margin: 12px 16px 0 auto;
    width: fit-content;
  }

  #chrono-bar.visible { display: flex; }

  .chrono-label { color: var(--muted); font-size: 11px; }
  .chrono-time { color: var(--accent); font-size: 20px; font-weight: 600; letter-spacing: 2px; }
  .chrono-paused { color: var(--red); font-size: 10px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── BUTTONS ── */
  .btn {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .btn:hover::after { opacity: 0.05; }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #000;
    font-size: 18px;
    padding: 20px 48px;
    border-radius: 8px;
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-danger {
    background: var(--red);
    color: white;
  }

  .btn-success {
    background: var(--green);
    color: #000;
  }

  .btn-warn {
    background: var(--accent2);
    color: white;
  }

  .btn-blue {
    background: var(--blue);
    color: white;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 12px;
    padding: 8px 16px;
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── CUVE BUTTONS ── */
  .cuve-btn {
    width: 140px;
    height: 140px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
  }

  .cuve-btn .cuve-num {
    font-family: var(--display);
    font-size: 32px;
    letter-spacing: 2px;
  }

  .cuve-btn.red {
    background: rgba(224, 51, 51, 0.15);
    border-color: var(--red);
    color: var(--red);
  }

  .cuve-btn.green {
    background: rgba(34, 197, 94, 0.15);
    border-color: var(--green);
    color: var(--green);
  }

  .cuve-btn.orange {
    background: rgba(240, 165, 0, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .cuve-btn:hover { transform: scale(1.04); }
  .cuve-btn:active { transform: scale(0.97); }

  /* ── FORM ── */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 340px;
  }

  .form-group label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .form-group input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    text-align: center;
    letter-spacing: 2px;
  }

  .form-group input:focus { border-color: var(--accent); }

  /* ── TITLE TEXT ── */
  .step-title {
    font-family: var(--display);
    font-size: 42px;
    letter-spacing: 4px;
    color: var(--text);
    text-align: center;
    margin-bottom: 12px;
  }

  .step-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: 1px;
  }

  /* ── ARCHIVE VIEW ── */
  #archive-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  #archive-overlay.visible { display: flex; }

  .archive-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 560px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 32px;
  }

  .archive-modal h2 {
    font-family: var(--display);
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .archive-modal .arc-date-full {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .phase-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .phase-row:last-child { border-bottom: none; }

  .phase-row .phase-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }

  .phase-row .phase-dur {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
  }

  /* ── CONFIRM OVERLAY ── */
  #confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }

  #confirm-overlay.visible { display: flex; }

  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
    text-align: center;
    width: 360px;
  }

  .confirm-box p {
    font-family: var(--mono);
    font-size: 14px;
    margin-bottom: 24px;
    line-height: 1.6;
    color: var(--text);
  }

  /* ── DECORATIVE ── */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(240,165,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,165,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #content > * { position: relative; z-index: 1; }

  .separator {
    width: 60px;
    height: 2px;
    background: var(--accent);
    margin: 0 auto 24px;
  }

  /* Cuve progress indicator */
  .cuves-progress {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .cuve-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
  }

  .cuve-dot.done { background: var(--green); }
  .cuve-dot.current { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn-delete {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    font-size: 11px;
    padding: 8px 14px;
  }
  .btn-delete:hover { background: rgba(224,51,51,0.12); }

  /* ── NOTES ── */
  .notes-area {
    width: 100%;
    max-width: 480px;
    min-height: 120px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    outline: none;
    resize: vertical;
    line-height: 1.6;
    transition: border-color 0.15s;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--muted); font-style: italic; }

  .back-btn-container {
    position: absolute;
    top: 24px;
    left: 24px;
  }

  /* ── INTERRUPTED BANNER ── */
  #interrupted-banner {
    display: none;
    background: rgba(224,92,0,0.18);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 12px 18px;
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
    text-align: center;
    max-width: 480px;
  }
  #interrupted-banner.visible { display: block; }

</style>
</head>
<body>

<div class="grid-bg"></div>

<!-- OVERLAY mobile -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <div>
      <h2>ARCHIVES</h2>
      <p>CYCLES TERMINÉS</p>
    </div>
    <button id="sidebar-close" onclick="closeSidebar()">✕</button>
  </div>
  <div id="archives-list">
    <p style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:12px;text-align:center;">Aucun cycle archivé</p>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <h1>SUIVI CHANTIER</h1>
    <span class="phase-badge" id="phase-badge" style="display:none"></span>
  </div>
  <!-- BOUTON ARCHIVES — visible uniquement sur mobile, sous la topbar -->
  <button id="sidebar-toggle" onclick="openSidebar()">
    ☰ &nbsp;ARCHIVES
  </button>

  <!-- CHRONO — suit le scroll de la page -->
  <div id="chrono-bar">
    <div>
      <div class="chrono-label" id="chrono-label">PHASE EN COURS</div>
      <div class="chrono-time" id="chrono-display">00:00:00</div>
    </div>
    <span class="chrono-paused" id="chrono-paused" style="display:none">■ PAUSE</span>
  </div>

  <!-- INTERRUPTED BANNER -->
  <div id="interrupted-banner">
    ⚠ Le serveur a été redémarré pendant un cycle actif.<br>
    Les chronos en cours ont été mis en pause automatiquement.<br>
    Reprenez le cycle là où vous en étiez.
  </div>
  <div id="content">
    <!-- dynamically rendered -->
  </div>
</div>

<!-- CHRONO BAR -->
<!-- ARCHIVE MODAL -->
<div id="archive-overlay">
  <div class="archive-modal" id="archive-modal-content"></div>
</div>

<!-- CONFIRM OVERLAY -->
<div id="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-text">Êtes-vous sûr ?</p>
    <div class="btn-group">
      <button class="btn btn-danger" id="confirm-yes">OUI</button>
      <button class="btn btn-secondary" id="confirm-no">NON</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let state = {
  cycles: [],
  active: null
};

// active cycle shape:
// {
//   id, date,
//   cuves: [{num, repairMs, repairPauses}],
//   nbCuves,
//   phase: 'SAISIE'|'TRAJET_ALLER'|'ATELIER'|'TRAJET_RETOUR'|'DONE',  // SAISIE = en cours de saisie pendant TRAJET_ALLER
//   subPhase: null | {cuveIdx, status:'WAITING'|'REPAIR'|'DONE'},
//   chronos: { TRAJET_ALLER:{start,elapsed,pauses}, ATELIER:{...}, TRAJET_RETOUR:{...}, repair_0:{...}, ... }
// }

// ─────────────────────────────────────────────
// CHRONO ENGINE
// ─────────────────────────────────────────────
let chronoTick = null;
let activeChronoKey = null;

function chronoStart(key) {
  activeChronoKey = key;
  const ac = state.active;
  if (!ac.chronos[key]) ac.chronos[key] = {start: Date.now(), elapsed: 0, paused: false, pauseStart: null};
  else {
    ac.chronos[key].start = Date.now();
    ac.chronos[key].paused = false;
  }
  if (chronoTick) clearInterval(chronoTick);
  chronoTick = setInterval(renderChronoBar, 500);
  document.getElementById('chrono-bar').classList.add('visible');
  renderChronoBar();
}

function chronoPause(key) {
  const c = state.active.chronos[key];
  if (!c || c.paused) return;
  c.elapsed += Date.now() - c.start;
  c.start    = 0;   // plus de timestamp actif — évite tout calcul parasite au redémarrage
  c.paused   = true;
  renderChronoBar();
}

function chronoResume(key) {
  const c = state.active.chronos[key];
  if (!c || !c.paused) return;
  c.paused = false;
  c.start = Date.now();
  activeChronoKey = key;
  // Relancer le tick visuel s'il n'est pas déjà actif
  if (chronoTick) clearInterval(chronoTick);
  chronoTick = setInterval(renderChronoBar, 500);
  document.getElementById('chrono-bar').classList.add('visible');
  renderChronoBar();
}

function chronoStop(key) {
  const c = state.active ? state.active.chronos[key] : null;
  if (c && !c.paused) c.elapsed += Date.now() - c.start;
  if (chronoTick) { clearInterval(chronoTick); chronoTick = null; }
  document.getElementById('chrono-bar').classList.remove('visible');
}

function getElapsed(key) {
  const ac = state.active;
  if (!ac || !ac.chronos[key]) return 0;
  const c = ac.chronos[key];
  if (c.paused) return c.elapsed;
  return c.elapsed + (Date.now() - c.start);
}

function msToHMS(ms) {
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  return [h,m,sec].map(v=>String(v).padStart(2,'0')).join(':');
}

function renderChronoBar() {
  if (!activeChronoKey) return;
  const el = document.getElementById('chrono-display');
  const paused = document.getElementById('chrono-paused');
  const c = state.active ? state.active.chronos[activeChronoKey] : null;
  if (c) {
    el.textContent = msToHMS(getElapsed(activeChronoKey));
    paused.style.display = c.paused ? 'inline' : 'none';
  }
}

function setChronoLabel(label) {
  document.getElementById('chrono-label').textContent = label;
}

// ─────────────────────────────────────────────
// PERSIST
// ─────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('visible');
  document.getElementById('sidebar-toggle').style.display = 'none';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
  document.getElementById('sidebar-toggle').style.display = 'flex';
}

// ─────────────────────────────────────────────
function restoreChronoDisplay(ac) {
  let chronoKey = null, chronoLabel = '';
  if (ac.phase === 'TRAJET_ALLER') {
    chronoKey = 'TRAJET_ALLER'; chronoLabel = 'RÉCUPÉRATION CUVE';
  } else if (ac.phase === 'TRAJET_RETOUR') {
    chronoKey = 'TRAJET_RETOUR'; chronoLabel = 'LIVRAISON CUVE';
  } else if (ac.phase === 'ATELIER' && ac.subPhase?.status === 'REPAIR') {
    const idx = ac.subPhase.cuveIdx;
    chronoKey  = 'repair_' + idx;
    chronoLabel = 'RÉPARATION #' + ac.cuves[idx]?.num;
  }
  if (chronoKey && ac.chronos[chronoKey]) {
    activeChronoKey = chronoKey;
    setChronoLabel(chronoLabel);
    if (!ac.chronos[chronoKey].paused) {
      startChronoTick();
    } else {
      renderChronoBar();
      document.getElementById('chrono-bar').classList.add('visible');
    }
  }
}

async function loadState() {
  // Vider le localStorage au cas où un ancien cycle y traîne encore
  try { localStorage.removeItem('chantier_active_cycle'); } catch(e) {}

  try {
    const r = await fetch('/api/data');
    const d = await r.json();
    state.cycles = d.cycles || [];
    state.active = d.active_cycle || null;

    if (state.active && state.active.chronos) {
      restoreChronoDisplay(state.active);
      document.getElementById('interrupted-banner').classList.remove('visible');
    }

    // Restaurer la saisie en cours si elle était persistée
    if (state.active && state.active.phase === 'TRAJET_ALLER') {
      if (state.active._saisieNb && state.active._saisieNb > 0) {
        saisieNb    = state.active._saisieNb;
        saisieCuves = state.active._saisieCuves || Array(saisieNb).fill(null);
        saisieEditIdx = -1;
      }
    }
  } catch(e) { console.error('loadState error:', e); }
  renderArchives();
  renderContent();
}

function startChronoTick() {
  if (chronoTick) clearInterval(chronoTick);
  chronoTick = setInterval(renderChronoBar, 500);
  document.getElementById('chrono-bar').classList.add('visible');
  renderChronoBar();
}

async function saveState() {
  try {
    await fetch('/api/save_active', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({active_cycle: state.active})
    });
  } catch(e) { console.error('saveState error:', e); }
}

async function archiveCycle(cycle) {
  try {
    await fetch('/api/archive_cycle', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({cycle})
    });
  } catch(e) { console.error('archiveCycle error:', e); }
}

// ─────────────────────────────────────────────
// RENDER ARCHIVES
// ─────────────────────────────────────────────
function getCycleMonth(c) {
  // Extraire YYYY-MM depuis la date du cycle (format dd/mm/yyyy hh:mm)
  try {
    const parts = c.date.split(' ')[0].split('/');
    return `${parts[2]}-${parts[1]}`; // YYYY-MM
  } catch(e) { return 'inconnu'; }
}

function monthLabel(ym) {
  const mois = ['Janvier','Février','Mars','Avril','Mai','Juin',
                 'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const [y, m] = ym.split('-');
  return `${mois[parseInt(m)-1]} ${y}`;
}

function renderArchives() {
  const el = document.getElementById('archives-list');
  if (state.cycles.length === 0) {
    el.innerHTML = '<p style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:12px;text-align:center;">Aucun cycle archivé</p>';
    return;
  }

  // Grouper par mois
  const byMonth = {};
  state.cycles.forEach((c, i) => {
    const ym = getCycleMonth(c);
    if (!byMonth[ym]) byMonth[ym] = [];
    byMonth[ym].push({c, i});
  });

  // Mois triés du plus récent au plus ancien
  const months = Object.keys(byMonth).sort().reverse();

  // Mois en cours = le plus récent
  const currentMonth = months[0];
  if (!selectedMonth) selectedMonth = currentMonth;
  // Si le mois sélectionné n'existe plus, revenir au plus récent
  if (!byMonth[selectedMonth]) selectedMonth = currentMonth;

  // Construire le sélecteur de mois
  const monthSelector = months.length > 1 ? `
    <div style="padding:8px 12px;border-bottom:1px solid var(--border)">
      <select id="month-select"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);
               border-radius:4px;color:var(--text);font-family:var(--mono);
               font-size:11px;padding:6px 8px;cursor:pointer"
        onchange="selectedMonth=this.value; renderArchives()">
        ${months.map(ym => `
          <option value="${ym}" ${ym===selectedMonth?'selected':''}>
            ${monthLabel(ym)} (${byMonth[ym].length} cycle${byMonth[ym].length>1?'s':''})
          </option>
        `).join('')}
      </select>
    </div>
  ` : `
    <div style="padding:8px 12px;border-bottom:1px solid var(--border);
                font-family:var(--mono);font-size:11px;color:var(--accent)">
      ${monthLabel(currentMonth)}
    </div>
  `;

  // Cycles du mois sélectionné, du plus récent au plus ancien
  const cyclesOfMonth = [...byMonth[selectedMonth]].reverse();

  const cyclesHTML = cyclesOfMonth.map(({c, i}) => `
    <div class="archive-item" onclick="showArchive(${i})" style="position:relative">
      <div class="arc-date">${c.date}</div>
      <div class="arc-cuves">${c.cuves.map(cv=>cv.num).join(' · ')}</div>
      <div class="arc-label">${c.cuves.length} cuve${c.cuves.length>1?'s':''}</div>
      <button class="btn btn-delete" style="margin-top:8px;width:100%"
        onclick="event.stopPropagation(); deleteCycle(${i})">🗑 SUPPRIMER</button>
    </div>
  `).join('');

  el.innerHTML = monthSelector + cyclesHTML;
}

function showArchive(idx) {  // idx = index dans state.cycles
  const c = state.cycles[idx];
  const modal = document.getElementById('archive-modal-content');

  const phases = [];
  if (c.chronos.TRAJET_ALLER) phases.push({name: '🚛 Récupération Cuve', ms: c.chronos.TRAJET_ALLER.elapsed});
  c.cuves.forEach((cv,i) => {
    if (c.chronos['repair_'+i]) phases.push({
      name:  `🔧 Réparation Cuve #${cv.num}`,
      ms:    c.chronos['repair_'+i].elapsed,
      notes: cv.notes || ''
    });
  });
  if (c.chronos.TRAJET_RETOUR) phases.push({name: '🚛 Livraison Cuve', ms: c.chronos.TRAJET_RETOUR.elapsed});

  const total = phases.reduce((s,p) => s+p.ms, 0);

  modal.innerHTML = `
    <h2>CYCLE #${c.id}</h2>
    <div class="arc-date-full">${c.date} — ${c.cuves.length} cuve${c.cuves.length>1?'s':''} : ${c.cuves.map(cv=>cv.num).join(', ')}</div>
    ${phases.map(p => `
      <div class="phase-row" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div style="display:flex;justify-content:space-between;width:100%">
          <span class="phase-name">${p.name}</span>
          <span class="phase-dur">${msToHMS(p.ms)}</span>
        </div>
        ${p.notes ? `<div style="font-family:var(--sans);font-size:12px;color:var(--muted);padding:6px 10px;background:var(--surface2);border-radius:4px;width:100%;line-height:1.5">${p.notes}</div>` : ''}
      </div>
    `).join('')}
    <div class="phase-row" style="margin-top:12px;border-top:2px solid var(--accent);padding-top:12px;">
      <span class="phase-name" style="color:var(--accent);font-weight:700">TOTAL (sans pauses)</span>
      <span class="phase-dur" style="color:var(--accent)">${msToHMS(total)}</span>
    </div>
    <div class="btn-group" style="margin-top:24px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeArchive()">FERMER</button>
      <button class="btn btn-delete" style="flex:1" onclick="deleteCycle(${idx}); closeArchive()">🗑 SUPPRIMER</button>
    </div>
  `;
  document.getElementById('archive-overlay').classList.add('visible');
}

function closeArchive() {
  document.getElementById('archive-overlay').classList.remove('visible');
}

async function deleteCycle(idx) {
  const c = state.cycles[idx];
  confirm(`Supprimer le cycle du ${c.date} (${c.cuves.map(cv=>cv.num).join(', ')}) ? Cette action est irréversible.`, async () => {
    try {
      const r = await fetch('/api/delete_cycle', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({cycle_id: c.id})
      });
      const d = await r.json();
      if (d.ok) {
        state.cycles.splice(idx, 1);
        renderArchives();
      } else {
        alert('Erreur lors de la suppression.');
      }
    } catch(e) {
      console.error('deleteCycle error:', e);
    }
  });
}

document.getElementById('archive-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeArchive();
});

// ─────────────────────────────────────────────
// CONFIRM DIALOG
// ─────────────────────────────────────────────
function confirm(msg, cb) {
  document.getElementById('confirm-text').textContent = msg;
  document.getElementById('confirm-overlay').classList.add('visible');
  document.getElementById('confirm-yes').onclick = () => {
    document.getElementById('confirm-overlay').classList.remove('visible');
    cb();
  };
  document.getElementById('confirm-no').onclick = () => {
    document.getElementById('confirm-overlay').classList.remove('visible');
  };
}

// ─────────────────────────────────────────────
// RENDER CONTENT
// ─────────────────────────────────────────────
function renderContent() {
  const el = document.getElementById('content');
  const badge = document.getElementById('phase-badge');
  const sidebar = document.getElementById('sidebar');
  const toggle  = document.getElementById('sidebar-toggle');
  const overlay = document.getElementById('sidebar-overlay');

  if (!state.active) {
    // Page accueil — sidebar visible
    badge.style.display = 'none';
    showSidebar();
    el.innerHTML = `
      <div style="text-align:center">
        <div class="step-title" style="font-size:64px;margin-bottom:4px">SUIVI</div>
        <div class="step-title" style="font-size:64px;color:var(--accent)">CUVES</div>
        <div class="separator"></div>
        <div class="step-sub">Système de suivi de chantier</div>
        <button class="btn btn-primary" onclick="startCycleFlow()">LANCER UN CYCLE</button>
      </div>
    `;
    return;
  }

  // Cycle actif — masquer sidebar et bouton archives
  hideSidebar();

  const ac = state.active;
  badge.style.display = 'inline';

  if (ac.phase === 'SAISIE') {
    // Phase SAISIE legacy → rediriger vers TRAJET_ALLER
    renderTrajetAller();
  } else if (ac.phase === 'TRAJET_ALLER') {
    renderTrajetAller();
  } else if (ac.phase === 'ATELIER') {
    renderAtelier();
  } else if (ac.phase === 'TRAJET_RETOUR') {
    renderTrajetRetour();
  }
}

// ─────────────────────────────────────────────
// PHASE 0 — SAISIE
// Système de grille : une case par cuve, clic pour éditer
// Numéros : 6 chiffres uniquement
// ─────────────────────────────────────────────
let saisieNb      = 0;
let selectedMonth = null; // 'YYYY-MM' — null = mois en cours
let saisieCuves   = [];   // tableau de strings (6 chiffres) ou null
let saisieEditIdx = -1;   // index de la case en cours d'édition

function hideSidebar() {
  const sidebar = document.getElementById('sidebar');
  const toggle  = document.getElementById('sidebar-toggle');
  const overlay = document.getElementById('sidebar-overlay');
  if (sidebar) sidebar.style.display = 'none';
  if (toggle)  toggle.style.display  = 'none';
  if (overlay) overlay.classList.remove('visible');
}

function showSidebar() {
  const sidebar = document.getElementById('sidebar');
  const toggle  = document.getElementById('sidebar-toggle');
  if (sidebar) sidebar.style.display = '';
  if (toggle)  toggle.style.display  = '';
}

function startCycleFlow() {
  saisieNb      = 0;
  saisieCuves   = [];
  saisieEditIdx = -1;
  state.active  = {
    id: Date.now(),
    date: new Date().toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    cuves: [],
    nbCuves: 0,
    phase: 'TRAJET_ALLER',
    subPhase: null,
    chronos: {
      TRAJET_ALLER: {start: Date.now(), elapsed: 0, paused: false, pauseStart: null}
    }
  };
  hideSidebar();
  activeChronoKey = 'TRAJET_ALLER';
  setChronoLabel('RÉCUPÉRATION CUVE');
  if (chronoTick) clearInterval(chronoTick);
  chronoTick = setInterval(renderChronoBar, 500);
  document.getElementById('chrono-bar').classList.add('visible');
  saveState();
  renderTrajetAller();
}

function renderSaisie() {
  const el    = document.getElementById('content');
  document.getElementById('phase-badge').textContent = 'SAISIE';

  // Étape 1 : choix du nombre de cuves
  if (saisieNb === 0) {
    el.innerHTML = `
      <div style="text-align:center">
        <div class="step-title">NOUVEAU CYCLE</div>
        <div class="step-sub">${state.active.date}</div>
        <div class="separator"></div>
        <p style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:24px">Nombre de cuves dans ce cycle :</p>
        <div class="btn-group">
          <button class="btn btn-secondary" style="font-size:24px;padding:20px 36px" onclick="chooseCuveNb(1)">1</button>
          <button class="btn btn-secondary" style="font-size:24px;padding:20px 36px" onclick="chooseCuveNb(2)">2</button>
          <button class="btn btn-secondary" style="font-size:24px;padding:20px 36px" onclick="chooseCuveNb(3)">3</button>
        </div>
        <br><br>
        <button class="btn btn-ghost" onclick="annulerCycle()">ANNULER</button>
      </div>
    `;
    return;
  }

  // Étape 2 : grille avec tous les inputs toujours dans le DOM
  renderCuveGrid('saisie');
}

function renderCuveGrid(ctx) {
  // ctx = 'saisie' ou 'trajet'
  // Tous les inputs sont toujours présents — on montre/cache par CSS
  // Cela évite la reconstruction du DOM qui ferme le clavier sur iOS

  const allFilled = saisieCuves.every(v => v);
  const isTrajet  = (ctx === 'trajet');

  const casesHTML = saisieCuves.map((val, i) => {
    const filled = !!val;
    const size   = isTrajet ? '110px' : '120px';
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px">CUVE ${i+1}</div>
        <div id="cuve-box-${i}" class="cuve-btn ${filled ? 'green' : 'red'}"
             style="width:${size};height:${size};position:relative;cursor:pointer"
             onclick="editCuve(${i})">
          <!-- Label affiché quand pas en édition -->
          <div id="cuve-label-${i}" style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <span class="cuve-num" style="font-size:${filled?'26px':'18px'}">${val || '—'}</span>
            <span style="font-size:9px">${filled ? '✓ OK' : 'CLIQUER'}</span>
          </div>
          <!-- Input toujours dans le DOM, caché quand pas en édition -->
          <div id="cuve-input-wrap-${i}" style="display:none;flex-direction:column;align-items:center;gap:4px">
            <input id="saisie-input-${i}"
              type="text" inputmode="numeric" maxlength="6"
              style="width:90px;background:transparent;border:none;border-bottom:2px solid var(--accent);outline:none;font-family:var(--display);font-size:22px;color:var(--text);text-align:center;letter-spacing:2px;padding-bottom:4px"
              placeholder="000000"
              value="${val || ''}"
              oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,6); saveCuveRealtime(${i}, this.value)"
              onkeydown="if(event.key==='Enter')focusNextCuve(${i})"
            >
            <span style="font-size:9px;color:var(--accent)">6 CHIFFRES</span>
            <button class="btn btn-success" style="padding:6px 20px;font-size:11px;margin-top:4px"
              onclick="event.stopPropagation();focusNextCuve(${i})">✓ OK</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const wrapId  = isTrajet ? 'cuve-grid-trajet' : 'cuve-grid-saisie';
  const btnHTML = allFilled
    ? `<button class="btn btn-primary" style="margin-top:16px"
         onclick="${isTrajet ? 'finalizeSaisieTrajet' : 'finalizeSaisie'}()">
         ✓ VALIDER LES CUVES
       </button>`
    : '';
  const backBtn = isTrajet
    ? `<button class="btn btn-ghost" style="font-size:11px;margin-top:8px" onclick="resetSaisieNb()">↩ CHANGER LE NOMBRE</button>`
    : `<button class="btn btn-ghost" onclick="resetSaisieNb()">← CHANGER LE NOMBRE</button>`;

  if (!isTrajet) {
    const el = document.getElementById('content');
    el.innerHTML = `
      <div style="text-align:center">
        <div class="step-title">SAISIE DES CUVES</div>
        <div class="step-sub">Cliquez sur une case pour saisir ou modifier</div>
        <div class="separator"></div>
        <div id="${wrapId}" class="btn-group" style="align-items:flex-start;justify-content:center;margin-bottom:16px">${casesHTML}</div>
        ${btnHTML}
        <br><br>${backBtn}
      </div>
    `;
  } else {
    // Trajet : injecter dans le conteneur existant
    const wrap = document.getElementById(wrapId);
    if (wrap) {
      wrap.innerHTML = casesHTML;
    }
    const btnWrap = document.getElementById('cuve-grid-btn');
    if (btnWrap) btnWrap.innerHTML = btnHTML;
  }

  // Activer la case en cours d'édition
  activateCuveInput(saisieEditIdx);
}

function activateCuveInput(idx) {
  // 1. La valeur est déjà dans saisieCuves grâce à saveCuveRealtime()
  //    On met juste à jour l'affichage de la case précédente
  if (saisieEditIdx >= 0 && saisieEditIdx !== idx) {
    updateCuveBox(saisieEditIdx, saisieCuves[saisieEditIdx]);
    persistSaisie();
  }

  saisieEditIdx = idx;
  const n = saisieCuves.length;

  for (let i = 0; i < n; i++) {
    const label = document.getElementById(`cuve-label-${i}`);
    const wrap  = document.getElementById(`cuve-input-wrap-${i}`);
    const box   = document.getElementById(`cuve-box-${i}`);
    const input = document.getElementById(`saisie-input-${i}`);
    if (!box) continue;

    if (i === idx) {
      box.style.borderColor = 'var(--accent)';
      box.style.boxShadow   = '0 0 0 3px rgba(240,165,0,0.3)';
      if (label) label.style.display = 'none';
      if (wrap)  wrap.style.display  = 'flex';
      if (input) { input.value = saisieCuves[i] || ''; input.focus(); }
    } else {
      updateCuveBox(i, saisieCuves[i]);
      if (label) label.style.display = 'flex';
      if (wrap)  wrap.style.display  = 'none';
    }
  }

  // Rafraîchir le bouton VALIDER si toutes les cases sont remplies
  if (saisieCuves.every(v => v) && idx === -1) {
    if (state.active?.phase === 'TRAJET_ALLER') renderTrajetAller();
    else renderSaisie();
  }
}

function updateCuveBox(i, val) {
  const box   = document.getElementById(`cuve-box-${i}`);
  const label = document.getElementById(`cuve-label-${i}`);
  if (!box) return;
  const filled = !!val;
  box.className     = `cuve-btn ${filled ? 'green' : 'red'}`;
  box.style.borderColor = filled ? '' : '';
  box.style.boxShadow   = '';
  if (label) label.innerHTML = `
    <span class="cuve-num" style="font-size:${filled?'26px':'18px'}">${val || '—'}</span>
    <span style="font-size:9px">${filled ? '✓ OK' : 'CLIQUER'}</span>
  `;
}

function focusNextCuve(i) {
  // Valider la case courante
  const input = document.getElementById(`saisie-input-${i}`);
  const val   = (input?.value || saisieCuves[i] || '').trim();
  if (/^[0-9]{6}$/.test(val)) {
    saisieCuves[i] = val;
    persistSaisie();
  }
  const next = saisieCuves.findIndex((v, idx) => idx > i && !v);
  if (next >= 0) {
    // Passer à la prochaine case vide
    saisieEditIdx = next;
    activateCuveInput(next);
  } else {
    // Toutes les cases remplies — fermer l'édition sans reconstruire le DOM
    saisieEditIdx = -1;
    activateCuveInput(-1);
    // Ajouter/mettre à jour le bouton VALIDER sans tout reconstruire
    showValidateButton();
  }
}

function showValidateButton() {
  const isTrajet = state.active?.phase === 'TRAJET_ALLER';
  const fn       = isTrajet ? 'finalizeSaisieTrajet' : 'finalizeSaisie';
  const btnId    = isTrajet ? 'cuve-grid-btn' : 'cuve-validate-btn';
  const gridId   = isTrajet ? 'cuve-grid-trajet' : 'cuve-grid-saisie';

  // Essayer d'insérer le bouton sans reconstruire le DOM
  let btnWrap = document.getElementById(btnId);
  const grid  = document.getElementById(gridId);

  if (!btnWrap && grid) {
    btnWrap = document.createElement('div');
    btnWrap.id = btnId;
    btnWrap.style.cssText = 'margin-top:16px;text-align:center';
    grid.parentNode.insertBefore(btnWrap, grid.nextSibling);
  }

  if (btnWrap) {
    btnWrap.innerHTML = `<button class="btn btn-primary" onclick="${fn}()">✓ VALIDER LES CUVES</button>`;
    return; // Succès — pas besoin de re-render
  }

  // Fallback : re-render complet si le DOM n'a pas la structure attendue
  if (isTrajet) renderTrajetAller();
  else renderSaisie();
}

function chooseCuveNb(n) {
  saisieNb      = n;
  saisieCuves   = Array(n).fill(null);
  saisieEditIdx = 0;
  renderSaisie();
}

let _blurTimeout = null;

function onCuveInputBlur(i) {
  // Délai pour laisser editCuve() s'exécuter si on clique sur une autre case
  _blurTimeout = setTimeout(() => {
    validateCuve(i);
    _blurTimeout = null;
  }, 200);
}

function editCuve(i) {
  // Annuler le blur en cours si on change de case
  if (_blurTimeout) { clearTimeout(_blurTimeout); _blurTimeout = null; }
  saisieEditIdx = i;
  activateCuveInput(i);
}

function validateCuve(i) {
  const input = document.getElementById(`saisie-input-${i}`);
  const val   = input?.value?.trim() || '';
  if (!/^[0-9]{6}$/.test(val)) {
    if (input) {
      input.style.borderBottomColor = 'var(--red)';
      input.style.color = 'var(--red)';
    }
    return;
  }
  saisieCuves[i] = val;
  persistSaisie();
  // Passer auto à la prochaine case vide
  const nextEmpty = saisieCuves.findIndex((v, idx) => idx > i && !v);
  saisieEditIdx   = nextEmpty >= 0 ? nextEmpty : -1;
  activateCuveInput(saisieEditIdx);
  // Si toutes les cases sont remplies, rafraîchir pour afficher le bouton VALIDER
  if (saisieCuves.every(v => v)) {
    if (state.active?.phase === 'TRAJET_ALLER') renderTrajetAller();
    else renderSaisie();
  }
}

// Clic en dehors des cases → valider la case active
document.addEventListener('touchend', function(e) {
  if (saisieEditIdx < 0) return;
  const target = e.target;
  // Ignorer si on clique sur une case, un input, ou un bouton de la grille
  if (target.closest('[id^="cuve-box-"]') ||
      target.closest('[id^="saisie-input-"]') ||
      target.closest('[id^="cuve-input-wrap-"]')) return;
  // Valider et fermer
  focusNextCuve(saisieEditIdx);
  saisieEditIdx = -1;
}, { passive: true });

document.addEventListener('mousedown', function(e) {
  if (saisieEditIdx < 0) return;
  const target = e.target;
  if (target.closest('[id^="cuve-box-"]') ||
      target.closest('[id^="saisie-input-"]') ||
      target.closest('[id^="cuve-input-wrap-"]')) return;
  focusNextCuve(saisieEditIdx);
  saisieEditIdx = -1;
});

function saveCuveRealtime(i, val) {
  // Sauvegarde immédiate à chaque frappe — évite toute perte au changement de case
  saisieCuves[i] = val.length === 6 ? val : null;
}

function persistSaisie() {
  if (state.active && state.active.phase === 'TRAJET_ALLER') {
    state.active._saisieNb    = saisieNb;
    state.active._saisieCuves = [...saisieCuves];
    saveState();
  }
}

function finalizeSaisie() {
  state.active.cuves   = saisieCuves.map(n => ({num: n, repaired: false}));
  state.active.nbCuves = saisieNb;
  saisieEditIdx        = -1;
  renderTrajetAller();
}

function resetSaisieNb() {
  saisieNb      = 0;
  saisieCuves   = [];
  saisieEditIdx = -1;
  renderSaisie();
}





// ─────────────────────────────────────────────
// PHASE 1 — RÉCUPÉRATION CUVE (Site → Atelier, saisie des cuves pendant le trajet)
// ─────────────────────────────────────────────


function renderTrajetAller() {
  const el = document.getElementById('content');
  const ac = state.active;
  document.getElementById('phase-badge').textContent = 'RÉCUPÉRATION CUVE';
  setChronoLabel('RÉCUPÉRATION CUVE');

  const isPaused   = ac.chronos['TRAJET_ALLER']?.paused;
  const hasCuves   = ac.cuves.length > 0;
  const cuvesFilled = ac.cuves.length === ac.nbCuves && ac.nbCuves > 0;

  // Zone de saisie des cuves (si pas encore choisi le nombre)
  let saisieHTML = '';
  if (saisieNb === 0 && !cuvesFilled) {
    saisieHTML = `
      <div style="margin:20px 0">
        <p style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:16px">
          SAISIR LES CUVES RÉCUPÉRÉES (facultatif pendant le trajet)
        </p>
        <p style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px">Nombre de cuves :</p>
        <div id="saisie-nb-trajet" class="btn-group" style="justify-content:center">
          <button class="btn btn-secondary" style="font-size:20px;padding:14px 28px" onclick="chooseCuveNbTrajet(1)">1</button>
          <button class="btn btn-secondary" style="font-size:20px;padding:14px 28px" onclick="chooseCuveNbTrajet(2)">2</button>
          <button class="btn btn-secondary" style="font-size:20px;padding:14px 28px" onclick="chooseCuveNbTrajet(3)">3</button>
        </div>
      </div>
    `;
  } else if (saisieNb > 0 && !cuvesFilled) {
    const allFilled = saisieCuves.every(v => v);
    saisieHTML = `
      <div style="margin:20px 0">
        <div id="cuve-grid-trajet" class="btn-group" style="align-items:flex-start;justify-content:center;margin-bottom:12px"></div>
        <div id="cuve-grid-btn"></div>
        <br><button class="btn btn-ghost" style="font-size:11px;margin-top:8px" onclick="resetSaisieNb()">↩ CHANGER LE NOMBRE</button>
      </div>
    `;
  } else if (cuvesFilled) {
    // Cuves déjà saisies — affichage + possibilité de modifier
    saisieHTML = `
      <div style="margin:20px 0">
        <div class="btn-group" style="justify-content:center;margin-bottom:8px">
          ${ac.cuves.map(c => `
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
              <div class="cuve-btn green" style="width:100px;height:100px">
                <span class="cuve-num" style="font-size:22px">${c.num}</span>
                <span style="font-size:9px">✓ OK</span>
              </div>
            </div>
          `).join('')}
        </div>
        <button class="btn btn-ghost" style="font-size:11px" onclick="modifierCuvesTrajet()">✏ MODIFIER LES CUVES</button>
      </div>
    `;
  }

  el.innerHTML = `
    <div style="text-align:center">
      <div class="step-title">RÉCUPÉRATION</div>
      <div class="step-title" style="color:var(--accent)">CUVES</div>
      <div class="separator"></div>
      ${saisieHTML}
      <div class="separator"></div>
      <div class="btn-group" style="justify-content:center">
        <button class="btn ${isPaused ? 'btn-success' : 'btn-warn'}" onclick="togglePauseAller()">
          ${isPaused ? '▶ REPRENDRE' : '⏸ PAUSE'}
        </button>
        <button class="btn btn-blue" onclick="arrivedAtelier()" ${!cuvesFilled ? 'disabled' : ''}>
          🏭 ARRIVÉE ATELIER
        </button>
      </div>
      <br><br>
      <button class="btn btn-ghost" onclick="annulerCycle()">✕ ANNULER LE CYCLE</button>
    </div>
  `;
  // Rendre la grille après injection du HTML
  if (saisieNb > 0 && !cuvesFilled) {
    renderCuveGrid('trajet');
    if (saisieEditIdx >= 0) activateCuveInput(saisieEditIdx);
  }
}

function chooseCuveNbTrajet(n) {
  saisieNb      = n;
  saisieCuves   = Array(n).fill(null);
  saisieEditIdx = 0;
  // Persister dans state.active pour survie au rechargement
  if (state.active) {
    state.active._saisieNb     = n;
    state.active._saisieCuves  = saisieCuves;
    saveState();
  }
  renderTrajetAller();
}

function finalizeSaisieTrajet() {
  state.active.cuves        = saisieCuves.map(n => ({num: n, repaired: false}));
  state.active.nbCuves      = saisieNb;
  state.active._saisieNb    = 0;
  state.active._saisieCuves = [];
  saisieNb      = 0;
  saisieCuves   = [];
  saisieEditIdx = -1;
  saveState();
  renderTrajetAller();
}

function modifierCuvesTrajet() {
  saisieNb      = state.active.nbCuves;
  saisieCuves   = state.active.cuves.map(c => c.num);
  saisieEditIdx = -1;
  state.active.cuves   = [];
  state.active.nbCuves = 0;
  saveState();
  renderTrajetAller();
}

function annulerCycle() {
  confirm("Annuler ce cycle ? Le chrono sera perdu.", () => {
    if (chronoTick) clearInterval(chronoTick);
    document.getElementById('chrono-bar').classList.remove('visible');
    state.active  = null;
    saisieNb      = 0;
    saisieCuves   = [];
    saisieEditIdx = -1;
    saveState();
    renderContent();
  });
}

function togglePauseAller() {
  const c = state.active.chronos['TRAJET_ALLER'];
  if (c.paused) chronoResume('TRAJET_ALLER');
  else chronoPause('TRAJET_ALLER');
  saveState();
  renderTrajetAller();
}



// ─────────────────────────────────────────────
// PHASE 2 — ATELIER
// ─────────────────────────────────────────────
function arrivedAtelier() {
  // Si des cuves sont en cours de saisie, les finaliser automatiquement
  if (saisieNb > 0 && saisieCuves.some(v => v)) {
    const filled = saisieCuves.filter(v => v);
    state.active.cuves   = filled.map(n => ({num: n, repaired: false}));
    state.active.nbCuves = filled.length;
  }
  // Réinitialiser l'état de saisie
  saisieNb      = 0;
  saisieCuves   = [];
  saisieEditIdx = -1;

  chronoPause('TRAJET_ALLER');
  if (chronoTick) { clearInterval(chronoTick); chronoTick = null; }
  document.getElementById('chrono-bar').classList.remove('visible');

  state.active.phase    = 'ATELIER';
  state.active.subPhase = null;
  saveState();
  renderAtelier();
}

function renderAtelier() {
  const el = document.getElementById('content');
  const ac = state.active;
  document.getElementById('phase-badge').textContent = 'ATELIER';

  if (!ac.subPhase) {
    // Show 3 cuve buttons
    const allDone = ac.cuves.every(c => c.repaired);
    el.innerHTML = `
      <div style="text-align:center">
        <div class="step-title">ATELIER</div>
        <div class="step-sub">Sélectionner une cuve pour commencer la réparation</div>
        <div class="separator"></div>
        <div class="btn-group" style="margin-bottom:32px">
          ${ac.cuves.map((c,i) => {
            const inProgress = !c.repaired && !!ac.chronos['repair_'+i];
            const color = c.repaired ? 'green' : inProgress ? 'orange' : 'red';
            const icon  = c.repaired ? '✓' : inProgress ? '⟳' : '⚙';
            const label = c.repaired ? 'RÉPARÉE' : inProgress ? 'EN COURS' : 'À RÉPARER';
            return `
            <button class="cuve-btn ${color}" onclick="selectCuve(${i})">
              <span style="font-size:20px">${icon}</span>
              <span class="cuve-num">${c.num}</span>
              <span style="font-size:10px">${label}</span>
            </button>`;
          }).join('')}
        </div>
        ${allDone ? `<button class="btn btn-primary" onclick="departAtelier()">🚛 DÉPART LIVRAISON</button>` : ''}
        <br><br>
        <button class="btn btn-ghost" onclick="backToArriverAtelier()">← RETOUR RÉCUPÉRATION</button>
      </div>
    `;
  } else {
    renderRepair();
  }
}

function backToArriverAtelier() {
  confirm("Revenir à la récupération ? Le chrono de trajet reprendra.", () => {
    // Restaurer saisie depuis les cuves actuelles
    saisieNb      = state.active.nbCuves;
    saisieCuves   = state.active.cuves.map(c => c.num);
    saisieEditIdx = -1;

    const c  = state.active.chronos['TRAJET_ALLER'];
    c.paused = false;
    c.start  = Date.now();
    state.active.phase    = 'TRAJET_ALLER';
    state.active.subPhase = null;
    activeChronoKey = 'TRAJET_ALLER';
    setChronoLabel('RÉCUPÉRATION CUVE');
    if (chronoTick) clearInterval(chronoTick);
    chronoTick = setInterval(renderChronoBar, 500);
    document.getElementById('chrono-bar').classList.add('visible');
    saveState();
    renderTrajetAller();
  });
}

function selectCuve(idx) {
  const key = 'repair_' + idx;
  const alreadyStarted = !!state.active.chronos[key];
  // Toujours passer par WAITING pour afficher le bouton approprié
  // Le chrono ne se lance QUE quand on clique sur le bouton
  state.active.subPhase = {cuveIdx: idx, status: 'WAITING'};
  renderRepair();
}

function renderRepair() {
  const el = document.getElementById('content');
  const ac = state.active;
  const sp = ac.subPhase;
  const cuve = ac.cuves[sp.cuveIdx];
  const key = 'repair_' + sp.cuveIdx;
  document.getElementById('phase-badge').textContent = `RÉPARATION #${cuve.num}`;

  if (sp.status === 'WAITING') {
    const alreadyStarted = !!ac.chronos[key];
    const btnLabel = alreadyStarted ? '▶ REPRENDRE RÉPARATION' : '🔧 DÉBUT RÉPARATION';
    el.innerHTML = `
      <div style="text-align:center">
        <div class="step-title">CUVE</div>
        <div class="step-title" style="color:var(--accent)">#${cuve.num}</div>
        <div class="separator"></div>
        <button class="btn btn-primary" onclick="debutReparation()">${btnLabel}</button>
        <br><br>
        <button class="btn btn-ghost" onclick="backToListeCuves()">← RETOUR CUVES</button>
      </div>
    `;
  } else if (sp.status === 'REPAIR') {
    const isPaused = ac.chronos[key]?.paused;
    setChronoLabel(`RÉPARATION #${cuve.num}`);
    el.innerHTML = `
      <div style="text-align:center">
        <div class="step-title">RÉPARATION</div>
        <div class="step-title" style="color:var(--accent)">#${cuve.num}</div>
        <div class="separator"></div>
        <div class="btn-group">
          <button class="btn ${isPaused ? 'btn-success' : 'btn-warn'}" onclick="togglePauseRepair()">
            ${isPaused ? '▶ REPRENDRE' : '⏸ PAUSE'}
          </button>
          <button class="btn btn-success" onclick="openNotes()">✓ FIN RÉPARATION</button>
        </div>
        <br><br>
        <button class="btn btn-ghost" onclick="backToListeCuves()">← RETOUR CUVES</button>
      </div>
    `;
  } else if (sp.status === 'NOTES') {
    const existingNotes = cuve.notes || '';
    el.innerHTML = `
      <div style="text-align:center">
        <div class="step-title">COMPTE-RENDU</div>
        <div class="step-title" style="color:var(--accent)">#${cuve.num}</div>
        <div class="separator"></div>
        <p style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:16px">
          Décrivez les réparations effectuées (optionnel)
        </p>
        <textarea id="repair-notes" class="notes-area"
          placeholder="Ex: Remplacement joint d'étanchéité, soudure fissure fond de cuve, nettoyage intérieur..."
        >${existingNotes}</textarea>
        <br><br>
        <div class="btn-group">
          <button class="btn btn-success" onclick="validateNotes()">✓ VALIDER ET TERMINER</button>
        </div>
        <br><br>
        <button class="btn btn-ghost" onclick="backToRepair()">← RETOUR RÉPARATION</button>
      </div>
    `;
    setTimeout(() => document.getElementById('repair-notes')?.focus(), 50);
  }
}

function debutReparation() {
  const sp = state.active.subPhase;
  const key = 'repair_' + sp.cuveIdx;
  sp.status = 'REPAIR';
  if (!state.active.chronos[key]) {
    state.active.chronos[key] = {start: Date.now(), elapsed: 0, paused: false, pauseStart: null};
  } else {
    state.active.chronos[key].paused = false;
    state.active.chronos[key].start = Date.now();
  }
  activeChronoKey = key;
  if (chronoTick) clearInterval(chronoTick);
  chronoTick = setInterval(renderChronoBar, 500);
  document.getElementById('chrono-bar').classList.add('visible');
  saveState();
  renderRepair();
}

function togglePauseRepair() {
  const key = 'repair_' + state.active.subPhase.cuveIdx;
  const c = state.active.chronos[key];
  if (c.paused) chronoResume(key);
  else chronoPause(key);
  saveState();
  renderRepair();
}

function openNotes() {
  // Le chrono CONTINUE de tourner pendant la saisie des notes
  const sp  = state.active.subPhase;
  sp.status = 'NOTES';
  saveState();
  renderRepair();
}

function validateNotes() {
  const sp    = state.active.subPhase;
  const key   = 'repair_' + sp.cuveIdx;
  const notes = document.getElementById('repair-notes')?.value?.trim() || '';
  // Arrêter le chrono au moment de valider la réparation
  chronoPause(key);
  if (chronoTick) { clearInterval(chronoTick); chronoTick = null; }
  document.getElementById('chrono-bar').classList.remove('visible');
  state.active.cuves[sp.cuveIdx].notes    = notes;
  state.active.cuves[sp.cuveIdx].repaired = true;
  state.active.subPhase = null;
  saveState();
  renderAtelier();
}

function backToRepair() {
  // Revenir à la réparation — chrono reste en pause, l'utilisateur reprend manuellement
  const sp  = state.active.subPhase;
  const key = 'repair_' + sp.cuveIdx;
  sp.status = 'REPAIR';
  activeChronoKey = key;
  setChronoLabel('RÉPARATION #' + state.active.cuves[sp.cuveIdx].num);
  // Afficher la barre figée sans relancer le tick
  renderChronoBar();
  document.getElementById('chrono-bar').classList.add('visible');
  if (chronoTick) { clearInterval(chronoTick); chronoTick = null; }
  saveState();
  renderRepair();
}

function backToListeCuves() {
  // If in repair mode, pause chrono
  if (state.active.subPhase?.status === 'REPAIR') {
    const key = 'repair_' + state.active.subPhase.cuveIdx;
    chronoPause(key);
    if (chronoTick) clearInterval(chronoTick);
    document.getElementById('chrono-bar').classList.remove('visible');
  }
  state.active.subPhase = null;
  document.getElementById('phase-badge').textContent = 'ATELIER';
  saveState();
  renderAtelier();
}

// Relancer réparation (reopen a repaired cuve)
function relancerReparation(idx) {
  confirm(`Relancer la réparation de la cuve #${state.active.cuves[idx].num} ? Elle repassera en rouge.`, () => {
    state.active.cuves[idx].repaired = false;
    // Reset chrono
    state.active.chronos['repair_'+idx] = {start: Date.now(), elapsed: 0, paused: false, pauseStart: null};
    state.active.subPhase = {cuveIdx: idx, status: 'REPAIR'};
    activeChronoKey = 'repair_'+idx;
    if (chronoTick) clearInterval(chronoTick);
    chronoTick = setInterval(renderChronoBar, 500);
    document.getElementById('chrono-bar').classList.add('visible');
    setChronoLabel(`RÉPARATION #${state.active.cuves[idx].num}`);
    saveState();
    renderRepair();
  });
}

// ─────────────────────────────────────────────
// PHASE 3 — LIVRAISON CUVE (Atelier → Site)
// ─────────────────────────────────────────────
function departAtelier() {
  state.active.phase = 'TRAJET_RETOUR';
  state.active.chronos['TRAJET_RETOUR'] = {start: Date.now(), elapsed: 0, paused: false, pauseStart: null};
  activeChronoKey = 'TRAJET_RETOUR';
  setChronoLabel('LIVRAISON CUVE');
  if (chronoTick) clearInterval(chronoTick);
  chronoTick = setInterval(renderChronoBar, 500);
  document.getElementById('chrono-bar').classList.add('visible');
  saveState();
  renderTrajetRetour();
}

function renderTrajetRetour() {
  const el = document.getElementById('content');
  const ac = state.active;
  document.getElementById('phase-badge').textContent = 'LIVRAISON CUVE';
  setChronoLabel('LIVRAISON CUVE');

  const isPaused = ac.chronos['TRAJET_RETOUR']?.paused;

  el.innerHTML = `
    <div style="text-align:center">
      <div class="step-title">LIVRAISON</div>
      <div class="step-title" style="color:var(--accent)">CUVES</div>
      <div class="step-sub">Cuves réparées : ${ac.cuves.map(c=>c.num).join(' · ')}</div>
      <div class="separator"></div>
      <div class="btn-group">
        <button class="btn ${isPaused ? 'btn-success' : 'btn-warn'}" onclick="togglePauseRetour()">
          ${isPaused ? '▶ REPRENDRE' : '⏸ PAUSE'}
        </button>
        <button class="btn btn-primary" onclick="arrivedSite()">🏗 ARRIVÉE SITE</button>
      </div>
      <br><br>
      <button class="btn btn-ghost" onclick="backToAtelier()">← RETOUR ATELIER</button>
    </div>
  `;
}

function togglePauseRetour() {
  const c = state.active.chronos['TRAJET_RETOUR'];
  if (c.paused) chronoResume('TRAJET_RETOUR');
  else chronoPause('TRAJET_RETOUR');
  saveState();
  renderTrajetRetour();
}

function backToAtelier() {
  confirm("Revenir à l'atelier ?", () => {
    chronoPause('TRAJET_RETOUR');
    if (chronoTick) { clearInterval(chronoTick); chronoTick = null; }
    document.getElementById('chrono-bar').classList.remove('visible');
    state.active.phase = 'ATELIER';
    state.active.subPhase = null;
    saveState();
    renderAtelier();
  });
}

async function arrivedSite() {
  const c = state.active.chronos['TRAJET_RETOUR'];
  chronoPause('TRAJET_RETOUR');
  if (chronoTick) clearInterval(chronoTick);
  document.getElementById('chrono-bar').classList.remove('visible');

  // Archive dans SQLite
  const cycleToArchive = {...state.active};
  state.cycles.push(cycleToArchive);
  state.active = null;
  await archiveCycle(cycleToArchive);
  renderArchives();


  // Show completion
  showSidebar(); // Réafficher la sidebar sur l'écran de fin
  const el = document.getElementById('content');
  document.getElementById('phase-badge').style.display = 'none';
  el.innerHTML = `
    <div style="text-align:center">
      <div class="step-title" style="color:var(--green)">CYCLE</div>
      <div class="step-title" style="color:var(--green)">TERMINÉ !</div>
      <div class="separator" style="background:var(--green)"></div>
      <p style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:32px">Cycle archivé avec succès.</p>
      <button class="btn btn-primary" onclick="startCycleFlow()">NOUVEAU CYCLE</button>
    </div>
  `;
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadState();
</script>
</body>
</html>
